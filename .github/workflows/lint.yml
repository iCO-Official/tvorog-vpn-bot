name: Lint

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort
    
    - name: Run flake8
      run: |
        flake8 bot.py database.py vpn_manager.py payments.py
    
    - name: Run black
      run: |
        black --check bot.py database.py vpn_manager.py payments.py
    
    - name: Run isort
      run: |
        isort --check-only bot.py database.py vpn_manager.py payments.py